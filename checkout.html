<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout — excel_bite</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <script>window.dataLayer = window.dataLayer || []; function gtag(){dataLayer.push(arguments);}</script>
</head>
<body>

  <nav class="navbar">
    <div class="container">
      <a href="/" class="navbar-logo">excel<span>_</span>bite</a>
      <div class="navbar-links" id="nav-menu">
        <a href="/cursos.html">Cursos</a>
        <a href="/#precios">Planes</a>
        <a href="/contacto.html">Contacto</a>
      </div>
      <div class="navbar-actions">
        <a href="/checkout.html" class="cart-icon"><span>&#128722;</span><span class="cart-badge" id="cart-badge">0</span></a>
        <button class="nav-toggle" id="nav-toggle">&#9776;</button>
      </div>
    </div>
  </nav>

  <section style="padding:120px 0 60px">
    <div class="container">
      <h1 style="font-size:2rem;font-weight:800;margin-bottom:40px">Finalizar compra</h1>
      <div class="checkout-grid">
        <div>
          <h3 style="font-size:1.125rem;font-weight:700;margin-bottom:20px">Tus datos</h3>
          <form id="checkout-form">
            <div class="form-row">
              <div class="form-group">
                <label for="nombre">Nombre</label>
                <input type="text" id="nombre" class="form-input" placeholder="Tu nombre" required>
              </div>
              <div class="form-group">
                <label for="apellidos">Apellidos</label>
                <input type="text" id="apellidos" class="form-input" placeholder="Tus apellidos" required>
              </div>
            </div>
            <div class="form-group">
              <label for="email">Email</label>
              <input type="email" id="email" class="form-input" placeholder="tu@email.com" required>
            </div>
            <div class="form-group">
              <label for="telefono">Teléfono</label>
              <input type="tel" id="telefono" class="form-input" placeholder="+34 600 000 000">
            </div>
            <div class="form-group">
              <label for="metodo-pago">Método de pago</label>
              <select id="metodo-pago" class="form-input">
                <option>Tarjeta de crédito/débito</option>
                <option>PayPal</option>
                <option>Transferencia bancaria</option>
              </select>
            </div>
            <button type="submit" class="btn btn-primary btn-lg btn-block" data-track="completar-compra" data-category="purchase">
              Completar compra
            </button>
          </form>
        </div>
        <div>
          <div class="order-summary">
            <h3>Resumen del pedido</h3>
            <div class="order-item" id="order-item">
              <span>Plan seleccionado</span>
              <span id="order-plan-name">—</span>
            </div>
            <div class="order-item">
              <span>Acceso</span>
              <span>12 meses</span>
            </div>
            <div class="order-total" id="order-total">
              <span>Total</span>
              <span id="order-total-price">&euro;0</span>
            </div>
          </div>
          <p style="font-size:.8125rem;color:var(--c-gray-400);margin-top:16px;text-align:center">
            Pago 100% seguro. No almacenamos datos de tarjetas.
          </p>
        </div>
      </div>
    </div>
  </section>

  <footer class="footer">
    <div class="container">
      <div style="font-weight:700;font-size:1.25rem">excel<span style="color:var(--c-accent)">_</span>bite</div>
      <div style="display:flex;gap:24px;font-size:.875rem">
        <a href="/#">Aviso legal</a>
        <a href="/#">Privacidad</a>
        <a href="/#">Cookies</a>
      </div>
      <div style="font-size:.8125rem;color:var(--c-gray-500)">&copy; 2026 excel_bite</div>
    </div>
  </footer>

  <script src="/js/dl.js"></script>
  <script src="/js/consent.js"></script>
  <script src="/js/main.js"></script>
  <script>
    const planKey = new URLSearchParams(location.search).get('plan') || 'basico';
    const plan = DL.plans[planKey];

    if (plan) {
      document.getElementById('order-plan-name').textContent = plan.name;
      document.getElementById('order-total-price').textContent = '€' + plan.price;
      App.addToCart(planKey);
      DL.pushBeginCheckout(plan);
    }

    document.getElementById('checkout-form').addEventListener('submit', function(e) {
      e.preventDefault();
      DL.pushFormSubmit('checkout');
      if (plan) DL.pushPurchase(plan);
      location.href = '/gracias.html';
    });
  </script>
</body>
</html>
