<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contacto — excel_bite</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <script>window.dataLayer = window.dataLayer || []; function gtag(){dataLayer.push(arguments);}</script>
</head>
<body>

  <nav class="navbar">
    <div class="container">
      <a href="/" class="navbar-logo">excel<span>_</span>bite</a>
      <div class="navbar-links" id="nav-menu">
        <a href="/cursos.html">Cursos</a>
        <a href="/#precios">Planes</a>
        <a href="/contacto.html">Contacto</a>
      </div>
      <div class="navbar-actions">
        <a href="/checkout.html" class="cart-icon"><span>&#128722;</span><span class="cart-badge" id="cart-badge">0</span></a>
        <a href="/#precios" class="btn btn-sm btn-primary">Empezar ahora</a>
        <button class="nav-toggle" id="nav-toggle">&#9776;</button>
      </div>
    </div>
  </nav>

  <section style="padding:140px 0 80px">
    <div class="container" style="max-width:640px">
      <div class="text-center">
        <h1 class="section-title">¿Tienes dudas?</h1>
        <p class="section-subtitle mx-auto">Rellena el formulario y te responderemos en menos de 24 horas.</p>
      </div>
      <form id="contact-form">
        <div class="form-row">
          <div class="form-group">
            <label for="nombre">Nombre</label>
            <input type="text" id="nombre" class="form-input" placeholder="Tu nombre" required>
          </div>
          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" class="form-input" placeholder="tu@email.com" required>
          </div>
        </div>
        <div class="form-group">
          <label for="asunto">Asunto</label>
          <select id="asunto" class="form-input">
            <option>Información general</option>
            <option>Duda sobre cursos</option>
            <option>Facturación</option>
            <option>Otros</option>
          </select>
        </div>
        <div class="form-group">
          <label for="mensaje">Mensaje</label>
          <textarea id="mensaje" class="form-input" rows="5" placeholder="Cuéntanos en qué podemos ayudarte..." required></textarea>
        </div>
        <button type="submit" class="btn btn-primary btn-lg btn-block" data-track="enviar-contacto" data-category="form">
          Enviar mensaje
        </button>
      </form>
      <p id="contact-success" style="display:none;margin-top:24px;padding:16px;background:#ECFDF5;color:#065F46;border-radius:var(--radius-sm);text-align:center">
        &#10003; Mensaje enviado correctamente. Te responderemos pronto.
      </p>
    </div>
  </section>

  <footer class="footer">
    <div class="container">
      <div style="font-weight:700;font-size:1.25rem">excel<span style="color:var(--c-accent)">_</span>bite</div>
      <div style="display:flex;gap:24px;font-size:.875rem">
        <a href="/#">Aviso legal</a>
        <a href="/#">Privacidad</a>
        <a href="/#">Cookies</a>
      </div>
      <div style="font-size:.8125rem;color:var(--c-gray-500)">&copy; 2026 excel_bite</div>
    </div>
  </footer>

  <script src="/js/dl.js"></script>
  <script src="/js/consent.js"></script>
  <script src="/js/main.js"></script>
  <script>
    document.getElementById('contact-form').addEventListener('submit', function(e) {
      e.preventDefault();
      DL.pushFormSubmit('contacto');
      DL.pushLead('contacto');
      document.getElementById('contact-success').style.display = 'block';
      this.reset();
    });
  </script>
</body>
</html>
